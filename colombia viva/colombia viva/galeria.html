<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colombia Viva - Galeria</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <div class="logo">Colombia Viva</div>
        <nav>
            <a href="index.html">Donde ir</a>
            <a href="festivales.html">Festivales</a>
            <a href="galeria.html">Galeria</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main>

        <section>
            <h2>Galeria Cultural</h2>
            <p class="subtitulo">Imagenes que capturan la esencia de Colombia</p>

            <div class="filtros">
                <button class="activo" onclick="filtrar('todos', this)">Todos</button>
                <button onclick="filtrar('carnavales', this)">Carnavales</button>
                <button onclick="filtrar('ferias', this)">Ferias</button>
                <button onclick="filtrar('eventos', this)">Eventos</button>
            </div>

            <div class="galeria-grid" id="galeria">
                <img src="images/carnaval.webp" alt="Carnaval de Barranquilla" class="carnavales">
                <img src="images/negros..webp" alt="Carnaval de Negros y Blancos" class="carnavales">
                <img src="images/flores.colores.webp" alt="Feria de las Flores de Medellin" class="ferias">
                <img src="images/cali.webp" alt="Feria de Cali" class="ferias">
                <img src="images/vallenato.webp" alt="Festival Vallenato" class="eventos">
                <img src="images/popayan.webp" alt="Semana Santa Popayan" class="eventos">
                <img src="images/carnaval2.webp" alt="Desfiles del Carnaval" class="carnavales">
                <img src="images/feria.webp" alt="Feria Artesanal de Colombia" class="ferias">
                <img src="images/cartagena.webp" alt="Hay Festival Cartagena" class="eventos">
            </div>
        </section>

    </main>

    <footer>
        <div>
            <h4>Contacto</h4>
            <a href="contacto.html">Formulario de contacto</a>
            <p>marianramirez134@gmail.com</p>
        </div>
        <div>
            <h4>Redes sociales</h4>
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
            <a href="#">YouTube</a>
        </div>
        <div>
            <h4>2026</h4>
            <p>Colombia Viva</p>
        </div>
    </footer>

    <script>
        function filtrar(categoria, boton) {
            var botones = document.querySelectorAll('.filtros button');
            for (var i = 0; i < botones.length; i++) {
                botones[i].classList.remove('activo');
            }
            boton.classList.add('activo');

            var imagenes = document.querySelectorAll('#galeria img');
            for (var j = 0; j < imagenes.length; j++) {
                if (categoria === 'todos') {
                    imagenes[j].style.display = 'block';
                } else {
                    if (imagenes[j].classList.contains(categoria)) {
                        imagenes[j].style.display = 'block';
                    } else {
                        imagenes[j].style.display = 'none';
                    }
                }
            }
        }
    </script>

</body>
</html>
